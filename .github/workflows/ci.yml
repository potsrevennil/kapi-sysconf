name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nix formatting, dead code, and anti-pattern checks, run in devShells.ci
  # (just the lint tools, no editor/interactive-shell extras). All three are
  # plain nixpkgs packages, so they substitute straight from cache.nixos.org
  # -- nothing for this job to build or cache. kapi-vim is a separate repo
  # (git submodule) and is excluded from all three.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - shell: nix develop .#ci -c bash -e {0}
        run: |
          files=$(find . -name "*.nix" -not -path "./users/home/kapi-vim/*")
          nixpkgs-fmt --check $files
          deadnix --fail --exclude users/home/kapi-vim .
          statix check --ignore "users/home/kapi-vim/**" .

  # Cheap eval-only pass across every declared system (aarch64-darwin,
  # x86_64-darwin, aarch64-linux, x86_64-linux) — catches syntax/option
  # errors before the real builds below spend runner time.
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - run: nix flake check --all-systems

  # Builds every host/profile. odroid uses GitHub's arm64 runner, not QEMU.
  # --impure exposes $CI to the flake, so home.nix's `lite` and
  # users/default.nix's ciUsername adapt for CI without separate outputs.
  #
  # switch: true (+ switchCmd) activates what was just built, since `nix
  # build` can't catch activation failures. Blocking by default
  # (switchContinueOnError opts a leg out while its switch is still
  # unproven) -- a check that can silently fail forever isn't a check.
  build:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin (wisdom-root-m4)
            runs-on: macos-14
            target: darwinConfigurations.wisdom-root-m4.system
            switch: true
            # Runs ./result's own activate script directly, like the
            # home-manager legs below, rather than `darwin-rebuild switch`:
            # darwin-rebuild re-evaluates the flake via its own nix build
            # (needing --impure/CI/USER re-forwarded through sudo) just to
            # reach this same activate script, plus registers a rollback
            # generation we don't care about on a disposable runner.
            switchCmd: sudo ./result/activate
          - name: home-manager (thing-hanlim, linux)
            runs-on: ubuntu-24.04-arm
            target: homeConfigurations.thing-hanlim-linux.activationPackage
            switch: true
            # Self-contained: no sudo, no re-eval. HOME_MANAGER_BACKUP_EXT
            # tells it to back up conflicting pre-existing files (the
            # runner's stock ~/.bashrc etc.) instead of refusing to
            # activate -- the standalone-mode equivalent of `home-manager
            # switch -b backup`.
            switchCmd: HOME_MANAGER_BACKUP_EXT=backup ./result/activate
          - name: home-manager (thing-hanlim, darwin)
            runs-on: macos-14
            target: homeConfigurations.thing-hanlim.activationPackage
            switch: true
            switchCmd: HOME_MANAGER_BACKUP_EXT=backup ./result/activate
          - name: nixos (odroid)
            runs-on: ubuntu-24.04-arm
            target: nixosConfigurations.nixos.config.system.build.toplevel
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-flake-target
        with:
          target: ${{ matrix.target }}
      - name: switch
        if: matrix.switch
        continue-on-error: ${{ matrix.switchContinueOnError == true }}
        timeout-minutes: 15
        run: time ${{ matrix.switchCmd }}

  # odroid-image involves real custom builds (a patched u-boot cross-build,
  # the RK3588S kernel/device-tree) that cache.nixos.org has no reason to
  # carry -- unlike everything else in this workflow, worth an explicit
  # cache. Split in two, mirroring wisroot/pqsca's cache-deps pattern: this
  # job is the only one that *builds* (gated by a content-hash sentinel, so
  # it skips entirely once a given flake.lock/hosts/odroid/image state has
  # already been cached -- cold builds run ~45-50min, warm ones ~7-8min).
  # magic-nix-cache-action uploads whatever it builds to the GHA cache.
  cache-odroid-image:
    needs: flake-check
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Check if this odroid-image state is already cached
        id: sentinel
        uses: actions/cache/restore@v5
        with:
          path: /tmp/odroid-image-cache-sentinel
          key: odroid-image-${{ runner.arch }}-${{ hashFiles('flake.lock', 'hosts/odroid/image/**') }}
          lookup-only: true
      - name: Install Nix
        id: install-nix
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        uses: nixbuild/nix-quick-install-action@v34
      - name: Magic Nix Cache
        if: steps.install-nix.conclusion == 'success'
        uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Build odroid-image
        if: steps.install-nix.conclusion == 'success'
        run: |
          time nix build .#nixosConfigurations.odroid-image.config.system.build.diskoImagesScript --impure --print-build-logs
          touch /tmp/odroid-image-cache-sentinel
      - name: Save cache sentinel
        if: steps.install-nix.conclusion == 'success'
        uses: actions/cache/save@v5
        with:
          path: /tmp/odroid-image-cache-sentinel
          key: odroid-image-${{ runner.arch }}-${{ hashFiles('flake.lock', 'hosts/odroid/image/**') }}

  # Only ever reads: runs regardless of whether cache-odroid-image did fresh
  # work this time, so a cache hit still gets end-to-end validated -- pulls
  # whatever's cached (fast) and actually runs the disko script to produce
  # the .raw image, the same step nixos-on-odroid-m2's release job used.
  # No artifact upload/release here, just build validation.
  odroid-image:
    needs: cache-odroid-image
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Build (should substitute from cache-odroid-image's run)
        run: time nix build .#nixosConfigurations.odroid-image.config.system.build.diskoImagesScript --impure --print-build-logs
      - name: Generate the disko image
        run: sudo ./result --build-memory 4096
