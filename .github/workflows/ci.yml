name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nix formatting, dead code, and anti-pattern checks, run in devShells.ci
  # (just the lint tools, no editor/interactive-shell extras). All three are
  # plain nixpkgs packages, so they substitute straight from cache.nixos.org
  # -- nothing for this job to build or cache. kapi-vim is a separate repo
  # (git submodule) and is excluded from all three.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - shell: nix develop .#ci -c bash -e {0}
        run: |
          files=$(find . -name "*.nix" -not -path "./users/home/kapi-vim/*")
          nixpkgs-fmt --check $files
          deadnix --fail --exclude users/home/kapi-vim .
          statix check --ignore "users/home/kapi-vim/**" .

  # Cheap eval-only pass across every declared system (aarch64-darwin,
  # x86_64-darwin, aarch64-linux, x86_64-linux) — catches syntax/option
  # errors before the real builds below spend runner time.
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - run: nix flake check --all-systems

  # Real builds of every host/profile the flake produces. odroid targets
  # aarch64-linux and runs on GitHub's native arm64 runner (free on public
  # repos) rather than x86_64 + QEMU emulation.
  #
  # The darwin and home-manager legs below build wisdom-root-m4/thing-hanlim
  # (-linux) directly -- the actual deployed configs, not separate ci-only
  # outputs -- since their username defaults to the CI runner's actual user
  # (via ciUsername in users/default.nix, mirroring home.nix's `lite`)
  # whenever built --impure under $CI=true, which build-flake-target always
  # passes and GitHub Actions always sets. Building the real attribute here
  # also lets the switch steps below reuse each leg's own ./result instead
  # of building twice.
  #
  # --impure also lets home.nix's lite default pick up $CI, which GitHub
  # Actions always sets, so the home-manager legs automatically skip
  # kapi-vim's haskell/lean/python/etc toolchains -- those, for these
  # specific package pins, routinely aren't covered by cache.nixos.org,
  # forcing slow local compiles. Real usage (no --impure) is unaffected and
  # always builds the full config. --impure is a no-op for the nixos target,
  # which never reads $CI. Everything in this flake is a stock nixpkgs
  # package and substitutes straight from cache.nixos.org, so there's
  # nothing worth caching across CI runs -- magic-nix-cache isn't used
  # anywhere here.
  #
  # Any leg can additionally set `switch: true` (plus `switchCmd`, the full
  # command to run) to apply the closure already built above (via
  # ./result). `nix build` alone only proves the closure evaluates and
  # builds -- it never runs activation scripts, so it can't catch
  # activation-time failures (permissions, pre-existing unmanaged files,
  # username/HOME checks, etc). darwin's switch is a real gate now that
  # it's proven reliable; the home-manager legs' switch is new and stays
  # non-blocking (switchContinueOnError) until proven the same way.
  build:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin (wisdom-root-m4)
            runs-on: macos-14
            target: darwinConfigurations.wisdom-root-m4.system
            switch: true
            # `nix run nix-darwin -- switch` resolves "nix-darwin" through
            # the global flake registry (a network fetch of
            # channels.nixos.org/flake-registry.json), which fails under
            # sudo since root's environment isn't set up to trust its TLS
            # cert. ./result already ships its own darwin-rebuild binary,
            # so invoking it directly avoids that registry indirection --
            # everything resolves from our own pinned flake inputs instead.
            # It calls bare `nix` internally via a hardcoded PATH rooted at
            # /nix/var/nix/profiles/default/bin (the system-wide multi-user
            # profile), which install-nix's daemon-mode install populates,
            # so this resolves fine as root without extra PATH forwarding.
            switchCmd: sudo ./result/sw/bin/darwin-rebuild switch --flake ".#wisdom-root-m4"
            switchNeedsEtcCleanup: true
          - name: home-manager (thing-hanlim, linux)
            runs-on: ubuntu-24.04-arm
            target: homeConfigurations.thing-hanlim-linux.activationPackage
            switch: true
            # Unlike darwin-rebuild, home-manager's activationPackage ships
            # a fully self-contained ./result/activate -- no sudo, no
            # --flake re-invocation. It force-overwrites pre-existing files
            # at the target paths (unless the target is a directory), so it
            # doesn't need the darwin leg's /etc-cleanup step either.
            switchCmd: ./result/activate
            switchContinueOnError: true
          - name: home-manager (thing-hanlim, darwin)
            runs-on: macos-14
            target: homeConfigurations.thing-hanlim.activationPackage
            switch: true
            switchCmd: ./result/activate
            switchContinueOnError: true
          - name: nixos (odroid)
            runs-on: ubuntu-24.04-arm
            target: nixosConfigurations.nixos.config.system.build.toplevel
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-flake-target
        with:
          target: ${{ matrix.target }}
      # nix-darwin refuses to activate over /etc files it doesn't already
      # manage (a safety check that matters on a real machine, to avoid
      # clobbering pre-existing config), which on a first-ever switch means
      # macOS's own stock /etc/shells, /etc/zshenv, etc. Every CI run gets a
      # pristine runner, so this fires every time, not just once -- unlike
      # on a real machine, there's nothing here worth preserving, so we can
      # just move the stock files aside ourselves instead of hand-holding
      # through it like a first-time human install would.
      - name: Move aside stock /etc files nix-darwin would refuse to touch
        if: matrix.switchNeedsEtcCleanup
        run: |
          for f in /etc/shells /etc/zshenv /etc/zshrc /etc/bashrc /etc/zprofile; do
            if [ -e "$f" ] && [ ! -L "$f" ]; then
              sudo mv "$f" "$f.before-nix-darwin"
            fi
          done
      - name: switch
        if: matrix.switch
        continue-on-error: ${{ matrix.switchContinueOnError == true }}
        timeout-minutes: 15
        run: time ${{ matrix.switchCmd }}
