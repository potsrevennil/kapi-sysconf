name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nix formatting, dead code, and anti-pattern checks, run in devShells.ci
  # (just the lint tools, no editor/interactive-shell extras). All three are
  # plain nixpkgs packages, so they substitute straight from cache.nixos.org
  # -- nothing for this job to build or cache. kapi-vim is a separate repo
  # (git submodule) and is excluded from all three.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - shell: nix develop .#ci -c bash -e {0}
        run: |
          files=$(find . -name "*.nix" -not -path "./users/home/kapi-vim/*")
          nixpkgs-fmt --check $files
          deadnix --fail --exclude users/home/kapi-vim .
          statix check --ignore "users/home/kapi-vim/**" .

  # Cheap eval-only pass across every declared system (aarch64-darwin,
  # x86_64-darwin, aarch64-linux, x86_64-linux) — catches syntax/option
  # errors before the real builds below spend runner time.
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - run: nix flake check --all-systems

  # Real builds of every host/profile the flake produces. odroid runs on
  # GitHub's native arm64 runner instead of x86_64 + QEMU emulation.
  #
  # --impure makes $CI visible to the flake (GitHub Actions always sets
  # it): home.nix's `lite` default uses it to skip slow-to-build toolchains,
  # and ciUsername (users/default.nix) uses it so darwin/home-manager build
  # as the runner's own user, letting the switch steps below activate
  # wisdom-root-m4/thing-hanlim(-linux) directly instead of needing
  # separate ci-only outputs. Real usage (no --impure) is unaffected.
  #
  # Any leg can set `switch: true` (+ `switchCmd`) to activate the closure
  # just built, since `nix build` alone can't catch activation-time
  # failures. darwin's switch is a proven, blocking gate; home-manager's is
  # new and stays non-blocking (switchContinueOnError) until proven too.
  build:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin (wisdom-root-m4)
            runs-on: macos-14
            target: darwinConfigurations.wisdom-root-m4.system
            switch: true
            # ./result already ships darwin-rebuild, so we run it directly
            # instead of `nix run nix-darwin -- switch` (which resolves
            # "nix-darwin" via the global flake registry -- a network call
            # that fails under sudo's untrusted TLS store). darwin-rebuild
            # re-evaluates the flake itself via its own nix build, so it
            # needs --impure too, plus CI/USER forwarded explicitly since
            # sudo resets the environment by default (macOS env_reset).
            switchCmd: sudo env CI=true "USER=$USER" ./result/sw/bin/darwin-rebuild switch --flake ".#wisdom-root-m4" --impure
            switchNeedsEtcCleanup: true
          - name: home-manager (thing-hanlim, linux)
            runs-on: ubuntu-24.04-arm
            target: homeConfigurations.thing-hanlim-linux.activationPackage
            switch: true
            # Self-contained, unlike darwin-rebuild: no sudo, no re-eval,
            # and it force-overwrites conflicting files itself, so it
            # doesn't need the darwin leg's /etc-cleanup step either.
            switchCmd: ./result/activate
            switchContinueOnError: true
          - name: home-manager (thing-hanlim, darwin)
            runs-on: macos-14
            target: homeConfigurations.thing-hanlim.activationPackage
            switch: true
            switchCmd: ./result/activate
            switchContinueOnError: true
          - name: nixos (odroid)
            runs-on: ubuntu-24.04-arm
            target: nixosConfigurations.nixos.config.system.build.toplevel
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-flake-target
        with:
          target: ${{ matrix.target }}
      # nix-darwin refuses to activate over unmanaged /etc files (a safety
      # check that matters on a real machine). Every CI run is a first-ever
      # switch on a pristine runner, so this always fires -- unlike on a
      # real machine, there's nothing here worth preserving.
      - name: Move aside stock /etc files nix-darwin would refuse to touch
        if: matrix.switchNeedsEtcCleanup
        run: |
          for f in /etc/shells /etc/zshenv /etc/zshrc /etc/bashrc /etc/zprofile; do
            if [ -e "$f" ] && [ ! -L "$f" ]; then
              sudo mv "$f" "$f.before-nix-darwin"
            fi
          done
      - name: switch
        if: matrix.switch
        continue-on-error: ${{ matrix.switchContinueOnError == true }}
        timeout-minutes: 15
        run: time ${{ matrix.switchCmd }}
