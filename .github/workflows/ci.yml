name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nix formatting, dead code, and anti-pattern checks, run in devShells.ci
  # (just the lint tools, no editor/interactive-shell extras). All three are
  # plain nixpkgs packages, so they substitute straight from cache.nixos.org
  # -- nothing for this job to build or cache. kapi-vim is a separate repo
  # (git submodule) and is excluded from all three.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - shell: nix develop .#ci -c bash -e {0}
        run: |
          files=$(find . -name "*.nix" -not -path "./users/home/kapi-vim/*")
          nixpkgs-fmt --check $files
          deadnix --fail --exclude users/home/kapi-vim .
          statix check --ignore "users/home/kapi-vim/**" .

  # Cheap eval-only pass across every declared system (aarch64-darwin,
  # x86_64-darwin, aarch64-linux, x86_64-linux) — catches syntax/option
  # errors before the real builds below spend runner time.
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/install-nix
      - run: nix flake check --all-systems

  # Builds every host/profile. odroid uses GitHub's arm64 runner, not QEMU.
  # --impure exposes $CI to the flake, so home.nix's `lite` and
  # users/default.nix's ciUsername adapt for CI without separate outputs.
  #
  # switch: true (+ switchCmd) activates what was just built, since `nix
  # build` can't catch activation failures. Blocking by default
  # (switchContinueOnError opts a leg out while its switch is still
  # unproven) -- a check that can silently fail forever isn't a check.
  build:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin (wisdom-root-m4)
            runs-on: macos-14
            target: darwinConfigurations.wisdom-root-m4.system
            switch: true
            # Runs ./result's own activate script directly, like the
            # home-manager legs below, rather than `darwin-rebuild switch`:
            # darwin-rebuild re-evaluates the flake via its own nix build
            # (needing --impure/CI/USER re-forwarded through sudo) just to
            # reach this same activate script, plus registers a rollback
            # generation we don't care about on a disposable runner.
            switchCmd: sudo ./result/activate
          - name: home-manager (thing-hanlim, linux)
            runs-on: ubuntu-24.04-arm
            target: homeConfigurations.thing-hanlim-linux.activationPackage
            switch: true
            # Self-contained: no sudo, no re-eval. HOME_MANAGER_BACKUP_EXT
            # tells it to back up conflicting pre-existing files (the
            # runner's stock ~/.bashrc etc.) instead of refusing to
            # activate -- the standalone-mode equivalent of `home-manager
            # switch -b backup`.
            switchCmd: HOME_MANAGER_BACKUP_EXT=backup ./result/activate
          - name: home-manager (thing-hanlim, darwin)
            runs-on: macos-14
            target: homeConfigurations.thing-hanlim.activationPackage
            switch: true
            switchCmd: HOME_MANAGER_BACKUP_EXT=backup ./result/activate
          - name: nixos (odroid)
            runs-on: ubuntu-24.04-arm
            target: nixosConfigurations.nixos.config.system.build.toplevel
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-flake-target
        with:
          target: ${{ matrix.target }}
      - name: switch
        if: matrix.switch
        continue-on-error: ${{ matrix.switchContinueOnError == true }}
        timeout-minutes: 15
        run: time ${{ matrix.switchCmd }}
