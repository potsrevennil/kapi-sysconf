name: 'Install Nix'
description: 'Install Nix'
runs:
  using: 'composite'
  steps:
    # Multi-user (daemon) install, not nixbuild/nix-quick-install-action's
    # single-user mode: nix-darwin's own darwin-rebuild script hardcodes
    # daemon-mode assumptions (NIX_REMOTE defaults to "daemon", and its PATH
    # search is rooted at /nix/var/nix/profiles/default/bin, the system-wide
    # multi-user profile) -- so `sudo darwin-rebuild switch` needs a real
    # daemon and a system profile to find `nix` as root, neither of which a
    # single-user install provides.
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22

    # Belt-and-suspenders: the installer already enables nix-command/flakes
    # system-wide, but writing it to /etc/nix/nix.conf ourselves means we
    # don't depend on that staying true if the installer's defaults change.
    - name: Enable flakes system-wide (for sudo'd nix invocations)
      shell: bash
      run: |
        sudo mkdir -p /etc/nix
        echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf
