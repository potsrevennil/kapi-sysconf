name: 'Install Nix'
description: 'Install Nix'
runs:
  using: 'composite'
  steps:
    # Multi-user (daemon) install: darwin-rebuild hardcodes daemon-mode
    # assumptions (NIX_REMOTE=daemon, PATH rooted at the system-wide
    # /nix/var/nix/profiles/default/bin), which a single-user install can't
    # satisfy for `sudo darwin-rebuild switch`.
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22

    # Belt-and-suspenders: the installer already does this, but we don't
    # want to depend on that staying true.
    - name: Enable flakes system-wide (for sudo'd nix invocations)
      shell: bash
      run: |
        sudo mkdir -p /etc/nix
        echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf
